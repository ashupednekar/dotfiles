general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(5e81acff)
    col.inactive_border = rgba(333333aa)
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 3
        passes = 2
    }
    shadow {
        enabled = true
        range = 10
        render_power = 2
    }
    active_opacity = 1.0
    inactive_opacity = 0.97
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.35, 0.95
    animation = windows, 1, 5, easeOutQuint, slide
    animation = windowsOut, 1, 4, easeInOutCubic, slide
    animation = fade, 1, 4, easeInOutCubic
    animation = workspaces, 1, 5, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 0   # 0 = respect preselect direction, not aspect ratio
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}
