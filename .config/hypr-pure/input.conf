input {
    kb_layout = us
    kb_options = compose:caps

    repeat_rate = 40
    repeat_delay = 600

    numlock_by_default = true

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        scroll_factor = 0.4
        tap-to-click = true
        drag_lock = false
    }
}

