$terminal = ghostty
$browser  = zen-browser
$menu     = walker

# ── Applications ────────────────────────────────────────────────────────────
bind = SUPER, return,   exec, $terminal
bind = SUPER, B,        exec, $browser
bind = SUPER SHIFT, B,  exec, $browser --private
bind = SUPER, SPACE,    exec, $menu
bind = SUPER, E,        exec, xdg-open https://gmail.com

# ── macOS-style clipboard (Super = Cmd) ─────────────────────────────────────
# Uses X11 clipboard shortcuts — compatible with all Wayland apps
bindd = SUPER, C, Copy,  sendshortcut, CTRL, Insert,
bindd = SUPER, V, Paste, sendshortcut, SHIFT, Insert,
bindd = SUPER CTRL, V, Clipboard manager, exec, cliphist list | walker --stdin | cliphist decode | wl-copy

# ── Tiling — explicit split direction (dwindle preselect) ───────────────────
bindd = SUPER, Z, Split horizontal (side by side), layoutmsg, preselect r
bindd = SUPER, X, Split vertical (top / bottom),   layoutmsg, preselect d
bindd = SUPER, J, Toggle split direction,           layoutmsg, togglesplit
bindd = SUPER, P, Toggle pseudo tile,               pseudo,

# ── Window control ───────────────────────────────────────────────────────────
bind = SUPER, W,        killactive,
bind = SUPER, F,        fullscreen, 0
bind = SUPER SHIFT, V,  togglefloating,

# ── Focus (vim-style) ────────────────────────────────────────────────────────
bind = SUPER, h, movefocus, l
bind = SUPER, j, movefocus, d
bind = SUPER, k, movefocus, u
bind = SUPER, l, movefocus, r

# ── Move window (vim-style) ──────────────────────────────────────────────────
bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, j, movewindow, d
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, l, movewindow, r

# ── Focus (arrow keys) ───────────────────────────────────────────────────────
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = SUPER, code:10, workspace, 1
bind = SUPER, code:11, workspace, 2
bind = SUPER, code:12, workspace, 3
bind = SUPER, code:13, workspace, 4
bind = SUPER, code:14, workspace, 5
bind = SUPER, code:15, workspace, 6
bind = SUPER, code:16, workspace, 7
bind = SUPER, code:17, workspace, 8
bind = SUPER, code:18, workspace, 9
bind = SUPER, code:19, workspace, 10

bind = SUPER SHIFT, code:10, movetoworkspace, 1
bind = SUPER SHIFT, code:11, movetoworkspace, 2
bind = SUPER SHIFT, code:12, movetoworkspace, 3
bind = SUPER SHIFT, code:13, movetoworkspace, 4
bind = SUPER SHIFT, code:14, movetoworkspace, 5
bind = SUPER SHIFT, code:15, movetoworkspace, 6
bind = SUPER SHIFT, code:16, movetoworkspace, 7
bind = SUPER SHIFT, code:17, movetoworkspace, 8
bind = SUPER SHIFT, code:18, movetoworkspace, 9
bind = SUPER SHIFT, code:19, movetoworkspace, 10

bind = SUPER, TAB,       workspace, e+1
bind = SUPER SHIFT, TAB, workspace, e-1

# ── Resize submap ────────────────────────────────────────────────────────────
bind = SUPER, R, submap, resize
submap = resize
binde = , h, resizeactive, -20 0
binde = , l, resizeactive,  20 0
binde = , k, resizeactive,  0 -20
binde = , j, resizeactive,  0  20
bind  = , escape, submap, reset
submap = reset

# ── Mouse drag ───────────────────────────────────────────────────────────────
bindmd = SUPER, mouse:272, movewindow
bindmd = SUPER, mouse:273, resizewindow
bind   = SUPER, mouse_down, workspace, e+1
bind   = SUPER, mouse_up,   workspace, e-1

# ── ALT+Tab ──────────────────────────────────────────────────────────────────
bind = ALT, TAB,       cyclenext,
bind = ALT SHIFT, TAB, cyclenext, prev

# ── Media keys ───────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@   5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@   5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@   toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = , Print,        exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, Print,   exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# ── Lock screen ───────────────────────────────────────────────────────────────
bind = SUPER ALT, L, exec, hyprlock
