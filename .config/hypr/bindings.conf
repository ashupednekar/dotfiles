# Application bindings
$terminal = uwsm app -- ghostty
bind = SUPER, F,      fullscreen
bind = SUPER, return, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bind = SUPER, B,       exec, uwsm app -- zen-browser
bind = SUPER SHIFT, B, exec, uwsm app -- zen-browser --private

# macOS-style clipboard (Super = Cmd)
bindd = SUPER, C, Copy,  sendshortcut, CTRL, Insert,
bindd = SUPER, V, Paste, sendshortcut, SHIFT, Insert,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# ── hy3 splits (i3-style — works for 2, 3, N windows) ───────────────────────
# Super+X then Super+Enter N times = N terminals side by side (horizontal row)
# Super+Z then Super+Enter N times = N terminals stacked (vertical column)
bind = SUPER, X, hy3:makegroup, h, toggle   # horizontal: side by side
bind = SUPER, Z, hy3:makegroup, v, toggle   # vertical:   stacked
bind = SUPER, E, hy3:changegroup, opposite  # toggle existing group direction

# ── Focus (Alt = Option, hjkl) ───────────────────────────────────────────────
bind = ALT, h, hy3:movefocus, l
bind = ALT, j, hy3:movefocus, d
bind = ALT, k, hy3:movefocus, u
bind = ALT, l, hy3:movefocus, r

# ── Move window (Super+Alt+hjkl) ─────────────────────────────────────────────
bind = SUPER ALT, h, hy3:movewindow, l
bind = SUPER ALT, j, hy3:movewindow, d
bind = SUPER ALT, k, hy3:movewindow, u
bind = SUPER ALT, l, hy3:movewindow, r

# ── Resize (Super+Shift+hjkl) ────────────────────────────────────────────────
binde = SUPER SHIFT, h, resizeactive, -40 0
binde = SUPER SHIFT, j, resizeactive,  0  40
binde = SUPER SHIFT, k, resizeactive,  0 -40
binde = SUPER SHIFT, l, resizeactive,  40 0

# Note: Super+Shift+[1-9] move to workspace is in omarchy tiling-v2.conf
