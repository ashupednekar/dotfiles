# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

bind = SUPER, f, fullscreen
bindd = SUPER, return, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private

# macOS-style clipboard (Super = Cmd)
bindd = SUPER, C, Copy,  sendshortcut, CTRL, Insert,
bindd = SUPER, V, Paste, sendshortcut, SHIFT, Insert,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# ── Explicit tiling splits ───────────────────────────────────────────────────
# Preselects the split direction for the next window you open.
# Press Super+Z (horizontal) or Super+X (vertical), then Super+Enter to split.
# Using exec+hyprctl for reliable param passing.
bind = SUPER, Z, exec, hyprctl dispatch layoutmsg "preselect r"
bind = SUPER, X, exec, hyprctl dispatch layoutmsg "preselect d"
# Toggle split direction of existing tile pair
bind = SUPER, T, layoutmsg, togglesplit

# ── Focus (Alt = Option, hjkl) ───────────────────────────────────────────────
bind = ALT, h, movefocus, l
bind = ALT, j, movefocus, d
bind = ALT, k, movefocus, u
bind = ALT, l, movefocus, r

# ── Move window (Super+Shift+hjkl) ──────────────────────────────────────────
bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, j, movewindow, d
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, l, movewindow, r

# ── Resize submap ────────────────────────────────────────────────────────────
bind = SUPER, R, submap, resize
submap = resize
binde = , h, resizeactive, -20 0
binde = , l, resizeactive,  20 0
binde = , k, resizeactive,  0 -20
binde = , j, resizeactive,  0  20
bind  = , escape, submap, reset
submap = reset

# Note: Super+Shift+[1-9] to move window to workspace is provided by
# omarchy's tiling-v2.conf (movetoworkspace bindings already active).
