# Application bindings
bind = SUPER, F,      fullscreen
bind = SUPER, return, exec, ~/.config/hypr/scripts/split-open.sh
bind = SUPER, B,       exec, uwsm app -- zen-browser
bind = SUPER SHIFT, B, exec, uwsm app -- zen-browser --private
bind = SUPER, D,       exec, rofi -show drun

# macOS-style clipboard (Super = Cmd)
bindd = SUPER, C, Copy,  sendshortcut, CTRL, Insert,
bindd = SUPER, V, Paste, sendshortcut, SHIFT, Insert,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# ── Split direction (persistent — Super+Return opens in last set direction) ───
bind = SUPER, Z, exec, echo h > ~/.cache/hypr-split-mode
bind = SUPER, X, exec, echo v > ~/.cache/hypr-split-mode
bind = SUPER, E, layoutmsg, togglesplit

# ── Focus (Alt+hjkl) ─────────────────────────────────────────────────────────
bind = ALT, h, movefocus, l
bind = ALT, j, movefocus, d
bind = ALT, k, movefocus, u
bind = ALT, l, movefocus, r

# ── Move window (Super+Alt+hjkl) ─────────────────────────────────────────────
bind = SUPER ALT, h, movewindow, l
bind = SUPER ALT, j, movewindow, d
bind = SUPER ALT, k, movewindow, u
bind = SUPER ALT, l, movewindow, r

# ── Resize (Super+Shift+hjkl) ────────────────────────────────────────────────
binde = SUPER SHIFT, h, resizeactive, -40 0
binde = SUPER SHIFT, j, resizeactive,  0  40
binde = SUPER SHIFT, k, resizeactive,  0 -40
binde = SUPER SHIFT, l, resizeactive,  40 0

# Note: Super+Shift+[1-9] move to workspace is in omarchy tiling-v2.conf
