# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

bind = SUPER, f, fullscreen
bindd = SUPER, return, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, M, Music, exec, omarchy-launch-webapp "https://music.apple.com"
bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password

bindd = SUPER, E, Email, exec, omarchy-launch-webapp "https://gmail.com"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

# macOS-style clipboard (Super = Cmd)
bindd = SUPER, C, Copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Paste, sendshortcut, SHIFT, Insert,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Tiling splits — explicit direction pre-selection (dwindle layout)
bindd = SUPER, Z, Split horizontal (side by side), layoutmsg, preselect r
bindd = SUPER, X, Split vertical (top / bottom), layoutmsg, preselect d

# Enter resize mode
bind = SUPER, R, submap, resize

# Resize mode
submap = resize
binde = , h, resizeactive, -20 0   # shrink horizontally
binde = , l, resizeactive, 20 0    # grow horizontally
binde = , k, resizeactive, 0 -20   # shrink vertically
binde = , j, resizeactive, 0 20    # grow vertically
# Exit resize mode
bind = , escape, submap, reset
submap = reset

bind = SUPER, h, movefocus, l
bind = SUPER, j, movefocus, d
bind = SUPER, k, movefocus, u
bind = SUPER, l, movefocus, r

bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, j, movewindow, d
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, l, movewindow, r
