# -- custom -------------------------------------------------------------------
set-option -g status-position top
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# resurrect vim/neovim sessions
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# -- minimal statusbar --------------------------------------------------------
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[bg=#a6e3a1 fg=#1e1e2e] session: #S #[bg=#89b4fa fg=#1e1e2e,none]'
set -g status-right '#[bg=default fg=#89b4fa,none]#[bg=#89b4fa fg=#1e1e2e] 󰅐 %H:%M #[bg=default]'
set -g status-left-length 30
set -g status-right-length 30
set -g window-status-format '#[fg=#6c7086] process: #W'
set -g window-status-current-format '#[bg=#89b4fa fg=#1e1e2e bold] process: #W #[fg=#89b4fa bg=default,none]#[bg=default]'
set -g window-status-separator '#[fg=#1e1e2e bg=default] #[fg=#1e1e2e bg=default]'

# -- general ------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

set -g base-index 1
setw -g pane-base-index 1

setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on

set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10
set -g history-limit 5000

set -g monitor-activity on
set -g visual-activity off

# -- keybindings --------------------------------------------------------------
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# navigation
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# splits
bind - split-window -v
bind _ split-window -h

# pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# toggle mouse
bind m set -g mouse

# clear history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# -- copy mode ----------------------------------------------------------------
bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# copy to clipboard (Linux)
if -b 'command -v xclip > /dev/null 2>&1' 'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"'

# -- buffers ------------------------------------------------------------------
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# -- plugins ------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
